services:
  - type: web
    name: cake-shop-api
    env: node
    buildCommand: npm install
    startCommand: npm run server
    envVars:
      - key: VITE_AUTH0_DOMAIN
        sync: false
      - key: VITE_RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: VITE_APP_URL
        value: https://mangeshghodke.github.io
